# Nginx config สำหรับ www.rungrot.com + Node.js (port 9000)
# วางใน /etc/nginx/sites-available/ แล้ว symlink ไป sites-enabled

# รับทุก host ที่เข้ามาพอร์ต 80 (รวม IP, www, root) → รันแอปก่อนเสมอ
server {
    listen 80 default_server;
    server_name www.rungrot.com rungrot.com;

    access_log /var/log/nginx/vps-access.log;
    error_log  /var/log/nginx/vps-error.log error;

    # ไฟล์ static จากโฟลเดอร์ public – Nginx เสิร์ฟเอง (เร็วขึ้น)
    root /home/email/public;
    location / {
        try_files $uri $uri/ @node;
    }

    # ทุกอย่างที่ไม่มีไฟล์จริง เช่น /, /api/* ส่งไป Node.js
    location @node {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API inbox ต้องไปที่ Node เสมอ
    location /api/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
